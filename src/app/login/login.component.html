<div class="container d-flex justify-content-center align-items-center min-vh-100 pt-5">
  <div class="row w-100 justify-content-center">
    <div class="col-md-6 col-lg-4">
      
      <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
        
        <div class="card-header bg-dark text-center py-4 border-0">
          <div class="mb-2">
            <i class="bi bi-shield-lock-fill text-warning" style="font-size: 2.5rem;"></i>
          </div>
          <h4 class="fw-bold text-white m-0">SecurityEz</h4>
          <small class="text-muted text-uppercase tracking-wider">Control de Acceso</small>
        </div>

        <div class="card-body p-4 bg-white">
          <form (ngSubmit)="login()" #formLogin="ngForm">
            
            <div class="mb-3">
              <label class="form-label small fw-bold text-secondary">Nombre de Usuario</label>
              <div class="input-group">
                <span class="input-group-text bg-light border-end-0 text-muted">
                  <i class="bi bi-person-fill"></i>
                </span>
                <input type="text" 
                       class="form-control bg-light border-start-0 ps-0" 
                       placeholder="Ej. rrendon" 
                       [(ngModel)]="usr" 
                       name="usuario" 
                       required>
              </div>
            </div>

            <div class="mb-4">
              <label class="form-label small fw-bold text-secondary">Contraseña</label>
              <div class="input-group">
                <span class="input-group-text bg-light border-end-0 text-muted">
                  <i class="bi bi-key-fill"></i>
                </span>
                <input type="password" 
                       class="form-control bg-light border-start-0 ps-0" 
                       placeholder="••••••••" 
                       [(ngModel)]="pwd" 
                       name="password" 
                       required>
              </div>
            </div>

            <button type="submit" 
                    class="btn btn-warning w-100 py-2.5 fw-bold text-dark text-uppercase shadow-sm mb-3"
                    [disabled]="isLoading || !formLogin.form.valid">
              <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
              {{ isLoading ? 'Verificando...' : 'Ingresar al Sistema' }}
            </button>

          </form>
        </div>

        <div class="card-footer bg-light py-3 text-center border-0">
          <p class="text-muted small m-0">
            ¿No tienes una cuenta aún? 
            <a [routerLink]="['/registro']" class="text-warning fw-bold text-decoration-none">Regístrate aquí</a>
          </p>
        </div>

      </div>

    </div>
  </div>
</div>
