<div class="container main-content">
<div class="row justify-content-end">
    <div class="col">
    <h2>Gestión Proveedores</h2>
  </div>
  <div class="col-lg-1 col-2">
    <button class="btn btn-success" (click)="NuevoProveedor()">Nuevo</button>
  </div>
</div>

<div class="d-flex justify-content-center" *ngIf="isLoading">
  <div class="spinner-border" role="status">
    <span class="visually-hidden">Loading...</span>
  </div>
</div>

<div class="row" *ngIf="!isLoading">
    <div class="col-12">
        <table class="table table-striped table-hover">
  <thead>
    <tr>
      <th scope="col">Id</th>
      <th scope="col">Nombre</th>
      <th scope="col">Direccion</th>
      <th scope="col">Telefono</th>
      
    </tr>
  </thead>
  <tbody class="table-group-divider">
    <tr *ngFor="let prov of vectorProveedores ">
      <th scope="row">{{prov.IdProveedor}}</th>
      <td>{{prov.Nombre}}</td>
      <td>{{prov.Direccion}}</td>
      <td>{{prov.Telefono}}</td>
      <td>
        <button class="btn btn-warning me-1" (click)="EditarProveedor(prov)">Editar</button>
        <button class="btn btn-danger" (click)="EliminarProveedor(prov.IdProveedor)">Eliminar</button>
      </td>
    </tr>
  </tbody>
</table>
    </div>
</div>
</div>

<!-- Modal -->
<div class="modal fade" id="modalProveedor" #modalProveedor tabindex="-1" aria-labelledby="modalProveedorLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h1 class="modal-title fs-5" id="modalProveedor">{{isNew ? 'Nuevo' : 'Editar'}} Proveedor</h1>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
      <app-cu-proveedor [proveedor]="proveedorSeleccionado"> </app-cu-proveedor>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button type="button" class="btn btn-primary" (click)="GuardarProveedor()">Guardar</button>
      </div>
    </div>
  </div>
</div>
