<div class="container main-content">
<div class="row justify-content-end">
    <div class="col">
    <h2>Gestión Reservas</h2>
  </div>
  <div class="col-lg-1 col-2">
    <button class="btn btn-success" (click)="NuevoReserva()">Nuevo</button>
  </div>
</div>

<div class="d-flex justify-content-center" *ngIf="isLoading">
  <div class="spinner-border" role="status">
    <span class="visually-hidden">Loading...</span>
  </div>
</div>

<div class="row" *ngIf="!isLoading">
    <div class="col-12">
        <table class="table table-striped table-hover">
  <thead>
    <tr>
      <th scope="col">Id</th>
      <th scope="col">IdUsuario</th>
      <th scope="col">Fecha</th>
      <th scope="col">Estado</th>
      
    </tr>
  </thead>
  <tbody class="table-group-divider">
    <tr *ngFor="let res of vectorReservas ">
      <th scope="row">{{res.IdReserva}}</th>
      <td>{{res.IdUsuario}}</td>
      <td>{{res.Fecha | date}}</td>
      <td>{{res.Estado}}</td>
      <td>
        <button class="btn btn-warning me-1" (click)="EditarReserva(res)">Editar</button>
        <button class="btn btn-danger" (click)="EliminarReserva(res.IdReserva)">Eliminar</button>
      </td>
    </tr>
  </tbody>
</table>
    </div>
</div>
</div>

<!-- Modal -->
<div class="modal fade" id="modalReserva" #modalReserva tabindex="-1" aria-labelledby="modalReservaLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h1 class="modal-title fs-5" id="modalReserva">{{isNew ? 'Nuevo' : 'Editar'}} Reserva</h1>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
      <app-cu-reserva [reserva]="reservaSelecionada"> </app-cu-reserva>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button type="button" class="btn btn-primary" (click)="GuardarReserva()">Guardar</button>
      </div>
    </div>
  </div>
</div>
