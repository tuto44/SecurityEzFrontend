name: Playwright & Jest Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    # ─── SERVICIO DE BASE DE DATOS (SQL SERVER EN DOCKER) ─────────────────────
    services:
      mssql:
        image: mcr.microsoft.com/mssql/server:2022-latest
        ports:
          - 1433:1433
        env:
          ACCEPT_EULA: "Y"
          MSSQL_SA_PASSWORD: "lore2006" # Coincide con tu config.ts y tu script .sql

    steps:
    - name: Checkout Frontend
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: lts/*
        
    - name: Install Frontend dependencies
      run: npm ci

    # ─── CONFIGURACIÓN Y CLONACIÓN DEL BACKEND ────────────────────────────────
    - name: Checkout Backend API
      uses: actions/checkout@v4
      with:
        # ⚠️ Recuerda cambiar esto por tu usuario real de GitHub
        repository: 'tuto44/SecurityEzBackend' 
        path: 'backend'
        # token: ${{ secrets.BACKEND_TOKEN }} # Descomenta si tu repositorio es privado

    - name: Install Backend dependencies
      run: |
        cd backend
        npm install

# ─── CONFIGURACIÓN DE LA BASE DE DATOS USANDO DATABASE.SQL ────────────────
    - name: Create Database Structure (database.sql)
      run: |
        # 1. Instalar las herramientas de SQL Server
        sudo apt-get update && sudo apt-get install -y mssql-tools unixodbc-dev
        
        # 2. Espera inteligente sin romper el pipeline ante fallos temporales
        echo "Esperando a que SQL Server responda en el puerto..."
        for i in {1..15}; do
          # -t 3 le dice a sqlcmd que desista a los 3 segundos si no conecta, evitando bloqueos eternos
          if /opt/mssql-tools/bin/sqlcmd -S 127.0.0.1 -U sa -P lore2006 -t 3 -Q "SELECT 1"; then
            echo "¡SQL Server está completamente listo y disponible!"
            READY=true
            break
          else
            echo "Intento $i/15: SQL Server aún está iniciando. Esperando 5 segundos..."
            sleep 5
          fi
        done

        # 3. Lanzar el script estructural si la conexión fue exitosa
        /opt/mssql-tools/bin/sqlcmd -S 127.0.0.1 -U sa -P lore2006 -i backend/database.sql

    # ─── ARRANQUE DE LA API EN SEGUNDO PLANO ──────────────────────────────────
    - name: Start Backend Server
      run: |
        cd backend
        # Arranca usando ts-node-dev en segundo plano gracias al '&'
        npm run start &
        # Esperamos 5 segundos a que Express se monte y escuche el puerto
        sleep 5 

    # ─── EJECUCIÓN DE PRUEBAS UNITARIAS (JEST) ─────────────────────────────────
    - name: Run Jest Unit Tests
      run: npx jest --testPathPattern="auth.service.spec|admin.guard.spec|usuario.service.spec|categoria.service.spec|proveedor.service.spec|producto.service.spec|carrito.service.spec|pedido.service.spec|utility.service.spec|descripcion-pedido.service.spec" --no-coverage --reporters=default --reporters=jest-html-reporter

    # ─── EJECUCIÓN DE PRUEBAS E2E (PLAYWRIGHT) ─────────────────────────────────
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
      
    - name: Run Playwright tests
      run: npx playwright test

    # ─── SUBIR REPORTE HTML DE JEST COMO ARTEFACTO ─────────────────────────────
    - name: Upload Jest HTML Report
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: jest-html-report
        path: test-report.html
        retention-days: 30

    # ─── SUBIR REPORTE HTML DE PLAYWRIGHT COMO ARTEFACTO ───────────────────────
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30