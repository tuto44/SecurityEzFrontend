name: Playwright & Jest Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
        
    - name: Install dependencies
      run: npm ci

    # ─── NUEVO: EJECUCIÓN DE PRUEBAS UNITARIAS CON JEST ─────────────────────────
    - name: Run Jest Unit Tests
      run: npx jest --testPathPattern="auth.service.spec|admin.guard.spec|usuario.service.spec|categoria.service.spec|proveedor.service.spec|producto.service.spec|carrito.service.spec|pedido.service.spec|utility.service.spec|descripcion-pedido.service.spec" --no-coverage --reporters=default --reporters=jest-html-reporter

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
      
    - name: Run Playwright tests
      run: npx playwright test

    # ─── NUEVO: SUBIR REPORTE HTML DE JEST COMO ARTEFACTO ───────────────────────
    - name: Upload Jest HTML Report
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: jest-html-report
        path: test-report.html # Nombre por defecto que genera jest-html-reporter
        retention-days: 30

    # ─── REPORTE DE PLAYWRIGHT (EXISTENTE) ──────────────────────────────────────
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30